<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>bardak's</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&family=Dancing+Script:wght@500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --krem:     #f5f0e2;
    --krem-2:   #ede7d3;
    --krem-3:   #ddd5c0;
    --lacivert: #1e4fa0;
    --lacivert2:#2860c0;
    --metin:    #1a1a1a;
    --metin-2:  #8e8e93;
    --hata:     #ff3b30;
    --basari:   #34c759;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    height:100%;
    font-family:'DM Sans', -apple-system, sans-serif;
    background:var(--krem);
    color:var(--metin);
    display:flex; align-items:center; justify-content:center;
  }
  .sayfa {
    width:100%; max-width:320px;
    padding:24px 20px 48px;
    display:flex; flex-direction:column; align-items:center;
  }
  .logo-cerceve {
    width:164px; height:164px;
    border:1.8px solid var(--lacivert);
    border-radius:50%;
    background:var(--krem);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    margin-bottom:36px;
    position:relative;
    flex-shrink:0;
  }
  .logo-ad {
    font-family:'Nunito', sans-serif;
    font-weight:800; font-size:32px;
    color:var(--lacivert);
    letter-spacing:-0.5px; line-height:1;
  }
  .logo-cizgi {
    width:78%; height:1.2px;
    background:var(--lacivert);
    margin:7px 0 5px;
  }
  .logo-slogan {
    font-family:'Dancing Script', cursive;
    font-size:12.5px; color:var(--lacivert);
    text-align:center; white-space:nowrap;
  }
  .logo-r {
    position:absolute; top:40px; right:28px;
    font-size:8px; font-family:'DM Sans', sans-serif;
    color:var(--lacivert);
  }
  .baslik {
    font-size:13px; font-weight:400;
    color:var(--metin-2); letter-spacing:0.2px;
    margin-bottom:24px; text-align:center;
  }
  .pin-satir {
    display:flex; gap:14px;
    justify-content:center; margin-bottom:32px;
  }
  .pin-kutu {
    width:14px; height:14px; border-radius:50%;
    border:1.5px solid var(--krem-3);
    background:transparent; transition:all .15s ease;
  }
  .pin-kutu.dolu {
    background:var(--lacivert); border-color:var(--lacivert);
    transform:scale(1.1);
  }
  .pin-kutu.hata {
    background:var(--hata); border-color:var(--hata);
    animation:titre .35s ease;
  }
  .numpad {
    display:grid; grid-template-columns:repeat(3, 72px);
    gap:12px; margin-bottom:20px; justify-content:center;
  }
  .tus {
    width:72px; height:72px; border-radius:50%;
    border:none; background:rgba(255,255,255,0.7);
    color:var(--metin);
    font-family:'DM Sans', -apple-system, sans-serif;
    font-size:22px; font-weight:300; cursor:pointer;
    transition:background .12s ease, transform .08s ease;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    user-select:none;
  }
  .tus:hover  { background:rgba(255,255,255,0.95); }
  .tus:active { background:var(--krem-3); transform:scale(0.94); }
  .tus-alt {
    font-size:8px; font-weight:400; letter-spacing:1.5px;
    color:var(--metin-2); margin-top:1px; text-transform:uppercase;
  }
  .tus.sil { font-size:18px; font-weight:300; color:var(--metin-2); }
  .tus.sil:active { color:var(--hata); }
  .tus.bos { background:transparent; cursor:default; pointer-events:none; }
  .btn-giris {
    width:100%; height:50px; border-radius:14px; border:none;
    background:var(--lacivert); color:#fff;
    font-family:'DM Sans', sans-serif;
    font-size:15px; font-weight:500; letter-spacing:0.3px;
    cursor:pointer; transition:opacity .2s, transform .1s;
  }
  .btn-giris:hover:not(:disabled) { opacity:0.88; }
  .btn-giris:active:not(:disabled) { transform:scale(0.99); }
  .btn-giris:disabled { opacity:0.25; cursor:not-allowed; }
  .mesaj {
    margin-top:14px; font-size:13px;
    text-align:center; display:none; color:var(--metin-2);
  }
  .mesaj.hata   { display:block; color:var(--hata); }
  .mesaj.basari { display:block; color:var(--basari); }
  .kilit-ekran { display:none; text-align:center; padding:12px 0; }
  .kilit-ikon { font-size:40px; margin-bottom:12px; filter:grayscale(1) opacity(0.4); }
  .kilit-baslik { font-size:15px; font-weight:500; color:var(--metin); margin-bottom:4px; }
  .kilit-sure {
    font-size:42px; font-weight:200; color:var(--lacivert);
    letter-spacing:3px; margin:12px 0; font-family:'DM Sans',sans-serif;
  }
  .kilit-aciklama { font-size:12px; color:var(--metin-2); line-height:1.8; }
  .yukleme {
    display:none; position:absolute; inset:0;
    border-radius:24px; background:rgba(245,240,226,0.92);
    align-items:center; justify-content:center;
    flex-direction:column; gap:12px; z-index:10;
  }
  .yukleme.aktif { display:flex; }
  .cark {
    width:24px; height:24px;
    border:1.5px solid var(--krem-3);
    border-top-color:var(--lacivert);
    border-radius:50%; animation:don .7s linear infinite;
  }
  .yukleme-yazi { font-size:12px; color:var(--metin-2); letter-spacing:0.5px; }
  .kart { width:100%; position:relative; padding:28px 0 0; }
  @keyframes titre { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes don   { to{transform:rotate(360deg)} }
  .alt-not { margin-top:32px; font-size:10px; color:var(--metin-2); letter-spacing:0.5px; opacity:0.45; }
</style>
</head>
<body>
<div class="sayfa">
  <div class="logo-cerceve">
    <div class="logo-ad">bardak's</div>
    <div class="logo-cizgi"></div>
    <div class="logo-slogan">"iz bırakan tatlar"</div>
    <span class="logo-r">®</span>
  </div>
  <div class="kart" id="anaKart">
    <div class="yukleme" id="yuklemeOverlay">
      <div class="cark"></div>
      <div class="yukleme-yazi">doğrulanıyor</div>
    </div>
    <div id="girisForm">
      <div class="baslik">pin kodunuzu girin</div>
      <div class="pin-satir">
        <div class="pin-kutu" id="p0"></div>
        <div class="pin-kutu" id="p1"></div>
        <div class="pin-kutu" id="p2"></div>
        <div class="pin-kutu" id="p3"></div>
      </div>
      <div class="numpad">
        <button class="tus" onclick="tusa('1')">1<div class="tus-alt"></div></button>
        <button class="tus" onclick="tusa('2')">2<div class="tus-alt">abc</div></button>
        <button class="tus" onclick="tusa('3')">3<div class="tus-alt">def</div></button>
        <button class="tus" onclick="tusa('4')">4<div class="tus-alt">ghi</div></button>
        <button class="tus" onclick="tusa('5')">5<div class="tus-alt">jkl</div></button>
        <button class="tus" onclick="tusa('6')">6<div class="tus-alt">mno</div></button>
        <button class="tus" onclick="tusa('7')">7<div class="tus-alt">pqrs</div></button>
        <button class="tus" onclick="tusa('8')">8<div class="tus-alt">tuv</div></button>
        <button class="tus" onclick="tusa('9')">9<div class="tus-alt">wxyz</div></button>
        <button class="tus bos"></button>
        <button class="tus" onclick="tusa('0')">0<div class="tus-alt">+</div></button>
        <button class="tus sil" onclick="silTus()">⌫</button>
      </div>
      <button class="btn-giris" id="girisBtn" onclick="pinGonder()" disabled>giriş yap</button>
      <div class="mesaj" id="mesajKutu"></div>
    </div>
    <div class="kilit-ekran" id="kilitEkran">
      <div class="kilit-ikon">🔒</div>
      <div class="kilit-baslik">giriş engellendi</div>
      <div class="kilit-sure" id="kilitSure">05:00</div>
      <div class="kilit-aciklama">çok fazla hatalı deneme<br>süre dolunca tekrar deneyin</div>
    </div>
  </div>
  <div class="alt-not">bardak's · v2.0</div>
</div>
<script>
const SUPABASE_URL = 'https://szavcharoqgofdeepnwk.supabase.co';
const SUPABASE_KEY = 'sb_publishable_m9257AIquNeNw6o9BfpMLA_SmGDGBxi';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
const MAX_DENEME=3, KILIT_KISA=5*60*1000, KILIT_UZUN=24*60*60*1000, OTURUM_TTL=8*60*60*1000, INAKTIF_TTL=30*60*1000;
let pin='', hataSayac=0, sayacRef=null;
window.addEventListener('DOMContentLoaded',()=>{
  mevcutOturumKontrol(); kilitKontrol(); inaktifTakip();
  document.addEventListener('keydown',e=>{
    if(e.key>='0'&&e.key<='9') tusa(e.key);
    if(e.key==='Backspace') silTus();
    if(e.key==='Enter') pinGonder();
  });
});
function mevcutOturumKontrol(){const s=oturumAl();if(!s)return;const now=Date.now();if(now-s.loginAt>OTURUM_TTL||now-s.lastActivity>INAKTIF_TTL){oturumSil();return;}yonlendir(s.rol);}
function kilitKontrol(){const k=kilitAl();if(!k)return;const kalan=k.kadar-Date.now();if(kalan<=0){kilitSil();hataSayac=0;return;}kilitGoster(kalan);}
function tusa(r){if(pin.length>=4)return;pin+=r;guncelle();if(pin.length===4)document.getElementById('girisBtn').disabled=false;}
function silTus(){if(!pin.length)return;pin=pin.slice(0,-1);guncelle();document.getElementById('girisBtn').disabled=pin.length<4;mesajTemizle();}
function guncelle(){for(let i=0;i<4;i++){const k=document.getElementById(`p${i}`);k.classList.toggle('dolu',i<pin.length);k.classList.remove('hata');}}
async function pinGonder(){if(pin.length<4)return;const k=kilitAl();if(k&&k.kadar>Date.now()){kilitGoster(k.kadar-Date.now());return;}yuklemeGoster(true);try{const{data,error}=await db.from('users').select('id, name, rol, sube_id, is_active').eq('pin',pin).eq('is_active',true).maybeSingle();if(error)throw error;if(!data){hataliGiris();return;}await basariliGiris(data);}catch(err){yuklemeGoster(false);mesajGoster('bağlantı hatası, tekrar deneyin','hata');pinSifirla();}}
async function basariliGiris(k){kilitSil();hataSayac=0;await logKayit('login',k.id,{});oturumKaydet({userId:k.id,ad:k.name,rol:k.rol,subeId:k.sube_id,loginAt:Date.now(),lastActivity:Date.now()});yuklemeGoster(false);mesajGoster(`hoş geldin, ${k.name.toLowerCase()}`,'basari');setTimeout(()=>yonlendir(k.rol),900);}
async function hataliGiris(){yuklemeGoster(false);hataSayac++;for(let i=0;i<4;i++)document.getElementById(`p${i}`).classList.add('hata');await logKayit('login_failed',null,{deneme:hataSayac});if(hataSayac>=MAX_DENEME){const sure=hataSayac>=5?KILIT_UZUN:KILIT_KISA;kilitKaydet({kadar:Date.now()+sure,sayac:hataSayac});pinSifirla();kilitGoster(sure);}else{mesajGoster(`hatalı pin — ${MAX_DENEME-hataSayac} deneme hakkı kaldı`,'hata');pinSifirla();}}
function kilitGoster(kalanMs){document.getElementById('girisForm').style.display='none';document.getElementById('kilitEkran').style.display='block';const el=document.getElementById('kilitSure');if(sayacRef)clearInterval(sayacRef);function tick(){const sn=Math.max(0,Math.ceil(kalanMs/1000));const d=n=>String(n).padStart(2,'0');el.textContent=`${d(Math.floor(sn/60))}:${d(sn%60)}`;if(sn<=0){clearInterval(sayacRef);kilitSil();hataSayac=0;document.getElementById('kilitEkran').style.display='none';document.getElementById('girisForm').style.display='block';}kalanMs-=1000;}tick();sayacRef=setInterval(tick,1000);}
function yonlendir(rol){window.location.href=(rol==='super_admin'||rol==='admin')?'https://maltuncu.github.io/bardaks-yonetici/dashboard.html':'https://maltuncu.github.io/bardaks-personel/dashboard.html';}
function inaktifTakip(){['click','keydown','touchstart'].forEach(e=>{document.addEventListener(e,()=>{const s=oturumAl();if(s){s.lastActivity=Date.now();oturumKaydet(s);}});});}
async function logKayit(eylem,uid,meta){try{await db.from('audit_log').insert({action:eylem,user_id:uid,table_name:'auth',new_data:meta,created_at:new Date().toISOString()});}catch(e){console.warn('log:',e);}}
function pinSifirla(){pin='';guncelle();document.getElementById('girisBtn').disabled=true;}
function yuklemeGoster(a){document.getElementById('yuklemeOverlay').classList.toggle('aktif',a);}
function mesajGoster(m,tip){const e=document.getElementById('mesajKutu');e.className=`mesaj ${tip}`;e.textContent=m;}
function mesajTemizle(){const e=document.getElementById('mesajKutu');e.className='mesaj';e.textContent='';}
const SK='bardaks_s',KK='bardaks_k';
const oturumAl=()=>{try{return JSON.parse(localStorage.getItem(SK));}catch{return null;}};
const oturumKaydet=s=>localStorage.setItem(SK,JSON.stringify(s));
const oturumSil=()=>localStorage.removeItem(SK);
const kilitAl=()=>{try{return JSON.parse(localStorage.getItem(KK));}catch{return null;}};
const kilitKaydet=d=>localStorage.setItem(KK,JSON.stringify(d));
const kilitSil=()=>localStorage.removeItem(KK);
window.BardaksAuth={oturumAl,oturumSil,zorunluGiris(gerekliRol=null){const s=oturumAl();if(!s){window.location.href='/';return null;}const now=Date.now();if(now-s.loginAt>OTURUM_TTL||now-s.lastActivity>INAKTIF_TTL){oturumSil();window.location.href='/';return null;}if(gerekliRol&&s.rol!==gerekliRol&&s.rol!=='super_admin'){window.location.href='/yetkisiz.html';return null;}s.lastActivity=now;oturumKaydet(s);return s;},cikis:async function(){const s=oturumAl();if(s)await logKayit('logout',s.userId,{});oturumSil();window.location.href='/';}};
</script>
</body>
</html>
